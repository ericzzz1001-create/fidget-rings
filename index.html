<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fidget Rings - Premium Spin Rings</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">💍 Fidget Rings</div>
            <div class="nav-links">
                <a href="#shop">Shop</a>
                <a href="#contact">Contact</a>
                <span class="cart-icon">🛒 <span id="cart-count">0</span></span>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-content">
            <h1>Premium Fidget Rings</h1>
            <p>Stress relief meets style. Spin your way to calm.</p>
            <button class="btn btn-primary" onclick="scrollToShop()">Shop Now</button>
        </div>
    </section>

    <!-- Shop Section -->
    <section id="shop" class="shop">
        <h2>Our Collection</h2>
        <div id="products-grid" class="products-grid"></div>
    </section>

    <!-- Cart Modal -->
    <div id="cart-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeCart()">&times;</span>
            <h2>Shopping Cart</h2>
            <div id="cart-items" class="cart-items"></div>
            <div class="cart-total">
                <span>Total: $</span>
                <span id="total-price">0.00</span>
            </div>
            <button class="btn btn-primary" onclick="checkout()">Checkout</button>
        </div>
    </div>

    <!-- Contact Section -->
    <section id="contact" class="contact">
        <h2>Get in Touch</h2>
        <form id="contact-form" class="contact-form">
            <input type="text" placeholder="Your Name" required>
            <input type="email" placeholder="Your Email" required>
            <textarea placeholder="Your Message" rows="5" required></textarea>
            <button type="submit" class="btn btn-primary">Send Message</button>
        </form>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <p>&copy; 2024 Fidget Rings. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
